<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huginn Match Replay — Argentina vs Egypt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --card: #111118;
      --border: rgba(255,255,255,0.07);
      --fg: #f0f0f8;
      --muted: #6060a0;
      --primary: #00e676;
      --primary-fg: #000;
      --wa-bg: #0a1a10;
      --wa-bubble: #1f2c1f;
      --wa-self: #075e54;
      --huginn-bubble: #1a1a28;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
    .match-badge {
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .score-display {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      font-family: monospace;
    }
    .score-display span { color: var(--primary); }

    /* ── Controls ── */
    .controls {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .btn {
      height: 38px;
      padding: 0 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: var(--primary-fg); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .speed-label { font-size: 12px; color: var(--muted); }
    .speed-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .progress-wrap { flex: 1; min-width: 100px; }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .event-label { font-size: 11px; font-family: monospace; color: var(--primary); min-width: 60px; }

    /* ── Split layout ── */
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 140px);
    }
    @media (max-width: 768px) {
      .split { grid-template-columns: 1fr; height: auto; }
    }

    /* ── Panel ── */
    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.015);
      flex-shrink: 0;
    }
    .panel-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .panel-icon.wa { background: #25d366; }
    .panel-icon.chat { background: rgba(0,230,118,0.12); font-size: 14px; }
    .panel-title { font-size: 13px; font-weight: 600; }
    .panel-sub { font-size: 11px; color: var(--muted); }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── WhatsApp message ── */
    .wa-msg {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      animation: fadeSlideUp 0.3s ease both;
    }
    .wa-bubble {
      max-width: 88%;
      background: var(--wa-bubble);
      border-radius: 0 10px 10px 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-line;
      color: #e8f5e9;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .wa-sender {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 3px;
    }
    .wa-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding-left: 2px;
    }

    /* ── Chat message ── */
    .chat-msg {
      display: flex;
      flex-direction: column;
      animation: fadeSlideUp 0.3s ease both;
    }
    .chat-msg.huginn { align-items: flex-start; }
    .chat-msg.user { align-items: flex-end; }
    .chat-bubble {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-line;
    }
    .chat-msg.huginn .chat-bubble {
      background: var(--huginn-bubble);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 4px 16px 16px 16px;
    }
    .chat-msg.user .chat-bubble {
      background: var(--primary);
      color: #000;
      border-radius: 16px 4px 16px 16px;
    }
    .chat-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ── Event divider ── */
    .event-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      animation: fadeSlideUp 0.3s ease both;
    }
    .event-divider::before, .event-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .event-divider span {
      font-size: 10px;
      font-family: monospace;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 10px 14px;
      background: var(--huginn-bubble);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      width: fit-content;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Done banner ── */
    .done-banner {
      display: none;
      text-align: center;
      padding: 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      border-top: 1px solid var(--border);
      background: rgba(0,230,118,0.04);
      flex-shrink: 0;
    }
  </style>
</head>

// ── Replay engine ────────────────────────────────────────────────────────────────
let playing = false;
let aborted = false;
let timeouts = [];

function getSpeed() {
  return parseFloat(document.getElementById('speedSelect').value);
}

function sleep(ms) {
  return new Promise(resolve => {
    const t = setTimeout(resolve, ms / getSpeed());
    timeouts.push(t);
  });
}

function scrollBottom(el) {
  el.scrollTop = el.scrollHeight;
}

function addDivider(container, text) {
  const d = document.createElement('div');
  d.className = 'event-divider';
  d.innerHTML = `<span>${text}</span>`;
  container.appendChild(d);
  scrollBottom(container);
}

function addWaMessage(text) {
  const wa = document.getElementById('waMsgs');
  const now = new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  const wrap = document.createElement('div');
  wrap.className = 'wa-msg';
  wrap.innerHTML = `
    <div class="wa-sender">Huginn 🦅</div>
    <div class="wa-bubble">${escHtml(text)}</div>
    <div class="wa-time">${now}</div>
  `;
  wa.appendChild(wrap);
  scrollBottom(wa);
}

function addChatMessage(from, text) {
  const chat = document.getElementById('chatMsgs');
  const now = new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  const wrap = document.createElement('div');
  wrap.className = `chat-msg ${from}`;
  wrap.innerHTML = `
    <div class="chat-bubble">${escHtml(text)}</div>
    <div class="chat-time">${now}</div>
  `;
  chat.appendChild(wrap);
  scrollBottom(chat);
}

  el.className = 'chat-msg huginn';
  el.id = 'typingIndicator';
  el.innerHTML = `<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chat.appendChild(el);
  scrollBottom(chat);
  return el;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*([^*]+)\*/g,'<strong>$1</strong>');
}

async function startReplay() {
  if (playing) return;
  playing = true;
  aborted = false;
  document.getElementById('playBtn').disabled = true;

  const total = events.length;

  for (let i = 0; i < events.length; i++) {
    if (aborted) break;

    const ev = events[i];
    await sleep(ev.delay || 0);
    if (aborted) break;

    // Update progress
    const pct = Math.round((i / (total - 1)) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('eventLabel').textContent = ev.label || '';

    // Divider
    if (ev.divider) {
      addDivider(document.getElementById('waMsgs'), ev.divider);
      addDivider(document.getElementById('chatMsgs'), ev.divider);
      await sleep(200);
      if (aborted) break;
    }

    // Chat user message (no typing indicator for user)
    if (ev.chat) {
      for (const m of ev.chat) {
        if (m.from === 'user') {
          addChatMessage('user', m.text);
          await sleep(400);
        }
      }
    }

    // Show typing in chat while bot "processes"
    const hasHuginnChat = ev.chat && ev.chat.some(m => m.from === 'huginn');
    const hasWa = ev.wa && ev.wa.length > 0;

    if (hasHuginnChat || hasWa) {
      const typing = showTyping();
      await sleep(900);
      if (aborted) { typing.remove(); break; }
      removeTyping();
    }

    // WhatsApp messages
    if (ev.wa) {
      for (const m of ev.wa) {
        addWaMessage(m.text);
        await sleep(200);
      }
    }

    // Chat Huginn messages
    if (ev.chat) {
      for (const m of ev.chat) {
        if (m.from === 'huginn') {
          addChatMessage('huginn', m.text);
          await sleep(150);
        }
      }
    }
  }

  if (!aborted) {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('eventLabel').textContent = 'Full Time';
    document.getElementById('waDone').style.display = 'block';
    document.getElementById('chatDone').style.display = 'block';
  }

  playing = false;
  document.getElementById('playBtn').disabled = false;
}

function resetReplay() {
  aborted = true;
  playing = false;
  timeouts.forEach(clearTimeout);
  timeouts = [];
  document.getElementById('waMsgs').innerHTML = '';
  document.getElementById('chatMsgs').innerHTML = '';
  document.getElementById('waDone').style.display = 'none';
  document.getElementById('chatDone').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('eventLabel').textContent = '—';
  document.getElementById('playBtn').disabled = false;
  setTimeout(() => { aborted = false; }, 100);
}
</script>
